name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Check migrations are consistent
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: |
          set +e
          pytest
          code=$?
          set -e
          if [ $code -eq 5 ]; then
            echo "No se recolectaron tests todavia (fase inicial del proyecto), no se considera fallo."
            exit 0
          fi
          exit $code

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar que la imagen construye (sin publicar)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
