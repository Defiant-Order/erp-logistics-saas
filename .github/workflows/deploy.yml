name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Portainer
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/defiant-order/erp-logistics-saas:latest

      - name: Disparar redeploy en Portainer (best-effort, no bloquea el pipeline)
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -fsS -X POST "$WEBHOOK_URL" || echo "El webhook de Portainer fallo, pero la imagen ya se publico. Revisar el redeploy manualmente."
          else
            echo "PORTAINER_WEBHOOK_URL no esta configurado, se omite el redeploy."
          fi
